apiVersion: v2
name: scutum-platform
description: Sovereign single-tenant deployment of the Scutum Command Platform
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - scutum
  - defense
  - sovereign
  - command-platform
  - critical-infrastructure
maintainers:
  - name: Scutum Defense
    url: https://scutum.defense
home: https://github.com/scutum-defense/scutum-helm
sources:
  - https://github.com/scutum-defense/scutum-helm
dependencies:
  - name: postgresql
    version: "~16.0"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
  - name: redis
    version: "~19.0"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: redis.enabled
